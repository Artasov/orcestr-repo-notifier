name: Orcestr Repo Notifier
description: Run Codex on a repository change and send a product or technical update to Telegram.

branding:
  icon: bell
  color: blue

inputs:
  openai-api-key:
    description: OpenAI API key used by openai/codex-action.
    required: true
  telegram-bot-token:
    description: Telegram bot token from BotFather.
    required: true
  telegram-chat-id:
    description: Telegram chat, group, or channel id.
    required: true
  telegram-message-thread-id:
    description: Optional Telegram forum topic message_thread_id.
    required: false
    default: ""
  model:
    description: Codex model.
    required: false
    default: gpt-5.5
  effort:
    description: Codex reasoning effort.
    required: false
    default: medium
  mode:
    description: Message mode. Use product, technical, or hybrid.
    required: false
    default: product
  language:
    description: Output language.
    required: false
    default: ru
  custom-prompt:
    description: Extra instructions appended to the default notifier prompt.
    required: false
    default: ""
  custom-task:
    description: Manual task for workflow_dispatch runs. When set, Codex inspects the repository and writes a Telegram message for this task instead of summarizing the push diff.
    required: false
    default: ""
  notify-branches:
    description: Optional comma- or newline-separated branch names/patterns that may run the notifier on push events. Supports * wildcards. Empty means all branches allowed by the workflow trigger.
    required: false
    default: ""
  require-commit-marker:
    description: When true, push events run only if at least one pushed commit message contains commit-marker.
    required: false
    default: "false"
  commit-marker:
    description: Commit message marker used when require-commit-marker is true.
    required: false
    default: "[notifier]"
  sandbox:
    description: Codex sandbox mode.
    required: false
    default: read-only
  safety-strategy:
    description: Codex Action safety strategy. Use drop-sudo, unprivileged-user, read-only, or unsafe.
    required: false
    default: drop-sudo
  codex-args:
    description: Extra codex exec arguments passed to openai/codex-action.
    required: false
    default: ""
  max-diff-chars:
    description: Maximum git diff characters included in the context file.
    required: false
    default: "30000"
  telegram-parse-mode:
    description: Telegram parse mode. Use none, HTML, Markdown, or MarkdownV2.
    required: false
    default: none
  dry-run:
    description: Run Codex but skip Telegram sending.
    required: false
    default: "false"

outputs:
  final-message:
    description: Final message returned by Codex.
    value: ${{ steps.codex.outputs.final-message }}
  should-run:
    description: Whether the notifier passed runtime filters.
    value: ${{ steps.notifier_guard.outputs.should_run }}
  skip-reason:
    description: Reason why the notifier skipped before Codex.
    value: ${{ steps.notifier_guard.outputs.skip_reason }}

runs:
  using: composite
  steps:
    - name: Ensure Node.js available
      uses: actions/setup-node@v5
      with:
        node-version: "24"
        package-manager-cache: false

    - name: Check notifier filters
      id: notifier_guard
      shell: bash
      env:
        ORCESTR_NOTIFIER_CUSTOM_TASK: ${{ inputs.custom-task }}
        ORCESTR_NOTIFIER_NOTIFY_BRANCHES: ${{ inputs.notify-branches }}
        ORCESTR_NOTIFIER_REQUIRE_COMMIT_MARKER: ${{ inputs.require-commit-marker }}
        ORCESTR_NOTIFIER_COMMIT_MARKER: ${{ inputs.commit-marker }}
      run: node "$GITHUB_ACTION_PATH/src/check-run.mjs"

    - name: Prepare Codex prompt
      if: ${{ steps.notifier_guard.outputs.should_run == 'true' }}
      shell: bash
      env:
        ORCESTR_NOTIFIER_MODE: ${{ inputs.mode }}
        ORCESTR_NOTIFIER_LANGUAGE: ${{ inputs.language }}
        ORCESTR_NOTIFIER_CUSTOM_PROMPT: ${{ inputs.custom-prompt }}
        ORCESTR_NOTIFIER_CUSTOM_TASK: ${{ inputs.custom-task }}
        ORCESTR_NOTIFIER_MAX_DIFF_CHARS: ${{ inputs.max-diff-chars }}
      run: node "$GITHUB_ACTION_PATH/src/prepare-prompt.mjs"

    - name: Run Codex
      if: ${{ steps.notifier_guard.outputs.should_run == 'true' }}
      id: codex
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.openai-api-key }}
        prompt-file: .orcestr-repo-notifier/prompt.md
        output-file: .orcestr-repo-notifier/codex-output.md
        model: ${{ inputs.model }}
        effort: ${{ inputs.effort }}
        sandbox: ${{ inputs.sandbox }}
        safety-strategy: ${{ inputs.safety-strategy }}
        codex-args: ${{ inputs.codex-args }}

    - name: Send Telegram message
      if: ${{ steps.notifier_guard.outputs.should_run == 'true' && inputs.dry-run != 'true' }}
      shell: bash
      env:
        ORCESTR_TELEGRAM_BOT_TOKEN: ${{ inputs.telegram-bot-token }}
        ORCESTR_TELEGRAM_CHAT_ID: ${{ inputs.telegram-chat-id }}
        ORCESTR_TELEGRAM_MESSAGE_THREAD_ID: ${{ inputs.telegram-message-thread-id }}
        ORCESTR_TELEGRAM_PARSE_MODE: ${{ inputs.telegram-parse-mode }}
      run: node "$GITHUB_ACTION_PATH/src/send-telegram.mjs"
